services:
  db:
    image: mysql:8.0
    container_name: task-manager-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - task-manager-network

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: task-manager-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./be:/app
      - /app/node_modules
    networks:
      - task-manager-network

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./fe:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - task-manager-network

volumes:
  db-data:
    name: task-manager-db-data

networks:
  task-manager-network:
    name: task-manager-network
    driver: bridge
